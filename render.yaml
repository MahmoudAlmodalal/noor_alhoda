databases:
  - name: noor-alhuda-db
    plan: free
    databaseName: noor_alhuda
    user: noor_alhuda

services:
  # ── Backend (Django) ──
  - type: web
    name: noor-alhuda-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn noor_alhuda.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: noor_alhuda.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: noor-alhuda-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: FCM_SERVER_KEY
        sync: false

  # ── Frontend (Next.js) ──
  - type: web
    name: noor-alhuda-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20.11.1"
