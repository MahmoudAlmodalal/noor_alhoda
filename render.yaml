databases:
  - name: noor-alhuda-db
    plan: free
    databaseName: noor_alhuda
    user: noor_alhuda

services:
  - type: web
    name: noor_alhoda
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ''
      - key: DJANGO_SETTINGS_MODULE
        value: noor_alhuda.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: noor-alhuda-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://noor-alhoda.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://noor-alhoda.onrender.com
      - key: CLOUDINARY_URL
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: ''
