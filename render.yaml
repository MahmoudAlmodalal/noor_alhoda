services:
  - type: web
    name: noor_alhoda
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: noor_alhuda.settings.production
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://frontend-nu-two-4e495azrjj.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://frontend-nu-two-4e495azrjj.vercel.app
      - key: CLOUDINARY_URL
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
